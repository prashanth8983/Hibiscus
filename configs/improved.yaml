data:
  tokenizer_type: word
  vocab_size: 5000
model:
  d_ff: 1024
  d_model: 256
  dropout: 0.1
  max_seq_len: 256
  n_heads: 8
  n_layers: 4
  vocab_size: 5000
training:
  batch_size: 16
  gradient_clip_val: 1.0
  learning_rate: 0.0001
  max_epochs: 50
  optimizer: adam
  use_amp: false
  use_ddp: false
  warmup_steps: 1000
  weight_decay: 0.01
